databases:
  - name: classroom-db
    plan: free
    databaseName: computer_classroom
    user: admin

services:
  - type: web
    name: classroom-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: classroom-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_SYSTEM_CHAT_ID
        sync: false
      - key: NODE_ENV
        value: production
