services:
  - type: web
    name: classroom-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push --accept-data-loss
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_SYSTEM_CHAT_ID
        sync: false
      - key: NODE_ENV
        value: production
